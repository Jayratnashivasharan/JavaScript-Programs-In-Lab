<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        form {
            max-width: 360px;
        }

        label {
            display: inline-block;
            width: 70px;
        }

        input {
            margin-bottom: 10px;
            padding: 6px;
            width: 220px;
        }

        input[type="submit"] {
            width: auto;
            cursor: pointer;
        }

        .error {
            color: red;
            font-size: 14px;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h2>Student Registration Form</h2>
    <form onsubmit="return validateForm()">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name">
        <span id="nameError" class="error"></span>

        <label for="email">Email:</label>
        <input type="text" id="email" name="email" placeholder="Enter your email">
        <span id="emailError" class="error"></span>

        <label for="mno">Mobile:</label>
        <input type="tel" id="mno" name="mobile" placeholder="Enter 10-digit mobile number">
        <span id="mobileError" class="error"></span>

        <input type="submit" value="Register">
    </form>

    <script>
        function validateForm() {
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const mobile = document.getElementById("mno").value.trim();

            const nameError = document.getElementById("nameError");
            const emailError = document.getElementById("emailError");
            const mobileError = document.getElementById("mobileError");

            nameError.textContent = "";
            emailError.textContent = "";
            mobileError.textContent = "";

            let isValid = true;

            if (name === "") {
                nameError.textContent = "Name is required.";
                isValid = false;
            } else if (!/^[A-Za-z ]{3,}$/.test(name)) {
                nameError.textContent = "Name must contain at least 3 letters.";
                isValid = false;
            }

            if (email === "") {
                emailError.textContent = "Email is required.";
                isValid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                emailError.textContent = "Enter a valid email address.";
                isValid = false;
            }

            if (mobile === "") {
                mobileError.textContent = "Mobile number is required.";
                isValid = false;
            } else if (!/^\d{10}$/.test(mobile)) {
                mobileError.textContent = "Mobile number must be exactly 10 digits.";
                isValid = false;
            }

            if (isValid) {
                alert("Registration successful.");
            }

            return isValid;
        }
    </script>
</body>
</html>
