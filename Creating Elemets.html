<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating Elements</title>
</head>
<body>
    <div id="demo"></div>

    <script>
        let para = document.createElement("p");
        para.textContent = "Hello Honey";
        document.getElementById("demo").appendChild(para);
    </script>
</body>
</html>
