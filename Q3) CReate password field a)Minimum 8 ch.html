<!-- Q3) CReate password field a)Minimum 8 charachters b)Must contain 1 uppercase 1 special charactere. -->
<!DOCTYPE html>
<html>
<head>
    <title>Password Validation</title>
</head>
<body>
    <form>
        <label for="password">Enter Password:</label>
        <input type="password" id="password" />
        <button type="button" onclick="validatePassword()">Submit</button>
    </form>

    <p id="message"></p>

    <script>
        function validatePassword() {
            let password = document.getElementById("password").value;
            let message = "";

            // Regex: at least 1 uppercase, 1 special char, min length 8
            let regex = /^(?=.*[A-Z])(?=.*[!@#$%^&*(),.?":{}|<>]).{8,}$/;

            if (regex.test(password)) {
                message = "✅ Password is valid!";
            } else {
                message = "❌ Password must be at least 8 characters, include 1 uppercase letter and 1 special character.";
            }

            document.getElementById("message").innerText = message;
        }
    </script>
</body>
</html>
